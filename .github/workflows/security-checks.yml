name: Security Checks

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  security-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true # High/Critical varsa uyarır ama || true sayesinde pipeline'ı asla kırmızıya düşürmez

      - name: Test Firestore rules
        run: npm run test:rules

      - name: Build
        run: npm run build
